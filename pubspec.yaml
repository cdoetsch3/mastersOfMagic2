name: masters_of_magic_2
description: "Masters of Magic 2 — a simultaneous-turn elemental mage-duel game."
publish_to: 'none'

# Keep in sync with lib/game/app_version.dart (shown on the About panel).
version: 0.8.10+19

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.3.0
  mom_engine:
    path: packages/mom_engine
  firebase_core: ^4.12.1
  firebase_auth: ^6.5.6
  http: ^1.6.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
